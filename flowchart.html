<text x="230" y="3625" class="node-text" style="font-size:15px;font-weight:600;fill:#7c3aed;text-anchor:start;">1. 积分冻结机制</text>
<text x="250" y="3650" class="node-text-sm" style="text-anchor:start;fill:#555;">调用AI前先冻结积分，AI成功则扣减，AI失败/超时则解冻退还，确保用户积分安全</text>

<text x="230" y="3685" class="node-text" style="font-size:15px;font-weight:600;fill:#b8860b;text-anchor:start;">2. 会员中心（Tab切换）</text>
<text x="250" y="3710" class="node-text-sm" style="text-anchor:start;fill:#555;">积分不足时：非会员跳转会员订阅Tab，会员跳转积分充值Tab</text>

<text x="230" y="3745" class="node-text" style="font-size:15px;font-weight:600;fill:#2563eb;text-anchor:start;">3. 登录后不自动继续</text>
<text x="250" y="3770" class="node-text-sm" style="text-anchor:start;fill:#555;">登录成功后回到页面，用户需自行重新点击按钮，不自动执行AI操作</text>

<text x="230" y="3805" class="node-text" style="font-size:15px;font-weight:600;fill:#dc2626;text-anchor:start;">4. AI灵感无弹窗</text>
<text x="250" y="3830" class="node-text-sm" style="text-anchor:start;fill:#555;">点击"AI灵感"直接生成内容，无需二次弹窗确认；AI优化需先有内容再优化</text>

<text x="230" y="3865" class="node-text" style="font-size:15px;font-weight:600;fill:#16a34a;text-anchor:start;">5. 草稿自动保存</text>
<text x="250" y="3890" class="node-text-sm" style="text-anchor:start;fill:#555;">所有表单变更800ms防抖自动保存至localStorage，页面刷新自动恢复；提交成功后清除草稿</text>

<text x="230" y="3925" class="node-text" style="font-size:15px;font-weight:600;fill:#8b5cf6;text-anchor:start;">6. 续写下一集</text>
<text x="250" y="3950" class="node-text-sm" style="text-anchor:start;fill:#555;">第2集起大纲自动沿用（只读），剧本清空待填写；结果页"下一集"按钮进入下一集</text>

<text x="230" y="3985" class="node-text" style="font-size:15px;font-weight:600;fill:#f59e0b;text-anchor:start;">7. AI生成中退出保护</text>
<text x="250" y="4010" class="node-text-sm" style="text-anchor:start;fill:#555;">AI生成中按返回键弹出确认对话框；确认离开则清理loading状态，取消则继续等待</text>

<text x="230" y="4045" class="node-text" style="font-size:15px;font-weight:600;fill:#0ea5e9;text-anchor:start;">8. 拆解结果字段</text>
<text x="250" y="4070" class="node-text-sm" style="text-anchor:start;fill:#555;">角色：性格/身份/外貌/角色描述(Seedream prompt)；分镜：主视角/景别/镜头运动/音色公式/氛围音效/场景图提示词/视频提示词</text>

<text x="230" y="4105" class="node-text" style="font-size:15px;font-weight:600;fill:#64748b;text-anchor:start;">9. 视频比例与分辨率</text>
<text x="250" y="4130" class="node-text-sm" style="text-anchor:start;fill:#555;">比例仅16:9(横屏)/9:16(竖屏)，分辨率480p/720p/1080p，参数携带至环节4分镜生成</text>
